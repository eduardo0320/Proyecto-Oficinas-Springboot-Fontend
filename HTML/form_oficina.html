<!DOCTYPE html>

  <!-- Vincula Bootstrap para estilos rápidos y responsivos -->

        integrity="sha384-..." crossorigin="anonymous">

  <!-- Bootstrap JS para funciones como el menú responsive -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-..." crossorigin="anonymous"></script>

  <script src="../JS/notificaciones.js"></script>

  <script src="../JS/oficina.js"></script> <!-- Script propio para gestionar oficinas (CRUD) -->

  <!-- Íconos de Bootstrap (para los íconos de mapa, guardar, etc.) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

  <script src="../JS/auth.js"></script> <!-- Script para gestionar la autenticación del usuario -->

  <script>verificarAutenticacion();</script> <!-- Verifica si el usuario está autenticado antes de mostrar la página -->

  <!-- Script para rellenar el formulario si se está editando una oficina -->
  <script>
    document.addEventListener("DOMContentLoaded",async function (){
      let index = localStorage.getItem("editIndex");
      if(index !== null){
        let oficina = await obtenerOficina(index);
        document.getElementById("nombre").value = oficina.nombre;
        document.getElementById("direccion").value = oficina.direccion
        document.getElementById("cantidad_maxima").value = oficina.cantidad_maxima;
        document.getElementById("ingresos_activos").value = oficina.ingresos_activos;

        if (oficina.direccion && oficina.direccion.includes("Lat:")) {
          localStorage.setItem("editLatLng", JSON.stringify(oficina.direccion));
        }
      } else {
        // Si es nuevo, limpiar posibles restos
        localStorage.removeItem("editLatLng");
      }
      initMap();








    })



  </script>
</head>
<body>

</div>

    <!-- Elementos del menú -->

    </div>
  </div>
</nav>

<!-- Contenedor principal -->
<div class="container mt-4">
  <h1 class="text-center mb-4">Crud de oficinas</h1> <!-- Título -->

  <!-- Formulario para agregar/editar oficinas -->
  <form id="formoficina" class="needs-validation" novalidate onsubmit="guardarOficina(event)">
    <div class="row mb-3">

      <input type="hidden" id="ingresos_activos">

      <!-- Campo: nombre de la oficina -->
      <div class="col-md-6">
        <label for="nombre" class="form-label">
          <i class="bi bi-geo-alt-fill"></i> Nombre
        </label>
        <input type="text" id="nombre" class="form-control" required/>
        <div class="invalid-feedback">
          Invalido
        </div>
      </div>

<!--      <div class="col-md-6">-->
<!--        <label for="direccion" class="form-label">-->
<!--          <i class="bi bi-geo-alt-fill"></i> Direccion-->
<!--        </label>-->
<!--        <input type="text" id="direccion" class="form-control" required/>-->
<!--        <div class="invalid-feedback">-->
<!--          Invalido-->
<!--        </div>-->
<!--      </div>-->





      <!-- Campo: ubicación con mapa (Google Maps) -->
      <div class="col-md-12">
        <label for="direccion" class="form-label">
          <i class="bi bi-geo-alt-fill"></i> Direccion
        </label>
        <div id="map" style="height: 400px; width: 60%;"></div> <!-- Mapa -->
        <input type="hidden" id="direccion" name="ubicacion" /> <!-- Dato oculto con la ubicación -->
      </div>

      <!-- Campo: cantidad máxima de personas en la oficina -->
      <div class="col-md-6">
        <label for="cantidad_maxima" class="form-label">
          <i class="bi bi-geo-alt-fill"></i> Cantidad Maxima
        </label>
        <input type="text" id="cantidad_maxima" class="form-control" required/>
        <div class="invalid-feedback">
          Invalido
        </div>
      </div>

      <!-- Botones de acción -->
      <div class="col-md-12 text-center mt-4 mb-5">
        <!-- Botón guardar -->
        <button type="submit" class="btn btn-light text-white me-2" style="background-color: #C8A2C8;">
          <i class="bi bi-bookmark-fill"></i> Guardar
        </button>
        <!-- Botón cancelar -->
        <button type="button" class="btn btn-secondary" onclick="window.location.href='oficina.html'">
          <i class="bi bi-bookmark-x-fill"></i> Cancelar
        </button>
      </div>

    </div>
  </form>
</div>

<!-- Carga del script de Google Maps con clave API y callback a `initMap` -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD7P7ZZfLzxg8A9mqYOrKl0zucKpaix4g8&callback=initMap" async defer></script>
