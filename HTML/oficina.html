<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- Establece el conjunto de caracteres a UTF-8, que soporta la mayoría de caracteres y símbolos -->

    <title>Lista de Oficinas</title>
    <!-- Título que aparecerá en la pestaña del navegador -->

    <!-- Enlace al CSS de Bootstrap para usar sus estilos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../JS/notificaciones.js"></script>

    <!-- Script propio que contiene funciones relacionadas a oficinas -->
    <script src="../JS/oficina.js"></script> <!--conecta-->

    <!-- Librería de íconos de Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

    <!-- Script para autenticación del usuario -->
    <script src="../JS/auth.js"></script>

    <!-- Ejecuta la función que verifica si el usuario está autenticado -->
    <script>verificarAutenticacion();</script>
</head>

<body>

<!-- Toast -->
<div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="toast" class="toast align-items-center border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body" id="toast-mensaje"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<!-- Barra de navegación superior -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <!-- Logo y nombre del sitio -->
        <a class="navbar-brand d-flex align-items-center" href="index.html">
            <i class="bi bi-emoji-smile-fill me-2" style="font-size: 1.5rem;"></i>
            Proyecto Demostración
        </a>

        <!-- Botón hamburguesa para móviles -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Contenido del menú -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <!-- Enlaces de navegación -->
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Lista de Personas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="oficina.html">Lista de Oficinas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="registro_ingresos.html"> Registros</a>
                </li>
                <!-- Enlace a la sección de registros -->
                <li class="nav-item">
                    <a class="nav-link" href="estadisticas.html"> Estadisticas</a>
                </li>
                <li class="nav-item">
                    <!-- Enlace para cerrar sesión -->
                    <a class="nav-link text-danger fw-bold" href="login.html">Cerrar sesión</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Contenedor principal -->
<div class="container mt-4">
    <!-- Título de la página con ícono -->
    <h1 class="text-center mb-4">
        <i class="bi bi-buildings"></i> Lista de Oficinas
    </h1>

    <!-- Mensaje que se muestra si no hay datos (está oculto por defecto) -->
    <p id="mensaje-vacio" class="text-center text-muted" style="display: none;">No hay datos disponibles</p>

    <!-- Botón para agregar una nueva oficina -->
    <button id="btn2" class="btn btn-light text-white mb-3" style="background-color: #C8A2C8; display: none;"
            onclick="localStorage.removeItem('editLatLng'); localStorage.removeItem('editIndex'); window.location.href='form_oficina.html';">
        <i class="bi bi-box-arrow-in-right"></i> Agregar Oficina
    </button>

    <!-- Tabla con lista de oficinas -->
    <div class="table-responsive" style="min-height: 899px;">
        <table class="table table-striped table-hover">
            <!-- Encabezado de la tabla -->
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre de Oficina</th>
                <th>Ubicación</th>
                <th>Cantidad Maxima</th>
                <th>Personal activo</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <!-- Cuerpo de la tabla donde se insertarán las oficinas -->
            <tbody id="oficinas-list">
            </tbody>
        </table>

        <div id="botones-pagina-oficinas" class="d-flex flex-wrap justify-content-center gap-2"></div>

        <!-- Script para cargar automáticamente las oficinas al cargar la página -->
        <script type="text/javascript">
            document.addEventListener("DOMContentLoaded", async function (){
                cargarOficinas(0);
                let rol = await obtenerRol();
                if(rol==="ADMIN") {
                    document.getElementById("btn2").style.display = "inline-block";
                }
                localStorage.removeItem("editIndex");
            });
        </script>
    </div>
</div>

<!-- Pie de página fijo en la parte inferior -->
<footer class="bg-dark text-white text-center py-3 position-fixed bottom-0 w-100">
    &copy; Proyecto Demostración
</footer>

</body>
</html>
