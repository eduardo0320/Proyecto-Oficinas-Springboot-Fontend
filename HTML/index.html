<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de Personas</title>

    <!-- Bootstrap: Librería para dar estilo a los componentes de la página -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Script de Bootstrap para los componentes interactivos -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>

    <script src="../JS/notificaciones.js"></script>

    <!-- Conexión con el script personalizado de manejo de personas -->
    <script src="../JS/persona.js"></script>

    <!-- Bootstrap Icons: Librería de íconos para usar en los botones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

    <!-- Librerías para exportar a PDF y Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/Fxlsx.full.min.js"></script>

    <!-- Script de autenticación para verificar la sesión -->
    <script src="../JS/auth.js"></script>

    <!-- Verificación de autenticación cuando se carga la página -->
    <script>verificarAutenticacion();</script>
</head>



<body>

<!-- Toast -->
<div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="toast" class="toast align-items-center border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body" id="toast-mensaje"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<!-- Barra de navegación -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <!-- Enlace a la página de inicio con un ícono -->
        <a class="navbar-brand d-flex align-items-center" href="index.html">
            <i class="bi bi-emoji-smile-fill me-2" style="font-size: 1.5rem;"></i>
            Proyecto Demostración
        </a>

        <!-- Botón de menú responsive (aparece en pantallas pequeñas) -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Menú de navegación -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <!-- Enlace a la lista de personas -->
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Lista de Personas</a>
                </li>
                <!-- Enlace a la lista de oficinas -->
                <li class="nav-item">
                    <a class="nav-link" href="oficina.html">Lista de Oficinas</a>
                </li>
                <!-- Enlace a la sección de registros -->
                <li class="nav-item">
                    <a class="nav-link" href="registro_ingresos.html"> Registros</a>
                </li>
                <!-- Enlace a la sección de registros -->
                <li class="nav-item">
                    <a class="nav-link" href="estadisticas.html"> Estadisticas</a>
                </li>
                <!-- Enlace para cerrar sesión -->
                <li class="nav-item">
                    <a class="nav-link text-danger fw-bold" href="login.html">Cerrar sesión</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Contenido principal -->
<div class="container mt-4">
    <h1 class="text-center mb-4">
        <i class="bi bi-people"></i> Lista de Personas
    </h1>
    <!-- Mensaje si no hay datos disponibles -->
    <p id="mensaje-vacio" class="text-center text-muted" style="display: none;">No hay datos disponibles</p>

    <div class="d-flex align-items-center gap-2 mb-3">
        <!-- Botón para agregar una nueva persona -->
        <button id="btn1" onclick="window.location.href='form.html'" class="btn btn-light text-white"
                style="background-color: #C8A2C8; display: none;">
            <i class="bi bi-box-arrow-in-right"></i> Agregar Persona
        </button>

        <!-- Botón para exportar la lista de personas a PDF -->
        <button class="btn btn-light text-white" style="background-color: #C8A2C8;" onclick="exportarPDF()">
            <i class="bi bi-file-earmark-pdf"></i> Exportar personas a PDF
        </button>

        <!-- Botón para exportar la lista de personas a Excel -->
        <button class="btn btn-light text-white" style="background-color: #C8A2C8;" onclick="exportarExcel()">
            <i class="bi bi-file-earmark-excel"></i> Exportar personas a Excel
        </button>

        <!-- Contenedor de búsqueda alineado a la derecha -->
        <div class="d-flex ms-auto gap-2 align-items-center">
            <!-- Selector de categoría de búsqueda -->
            <select id="categoriaBusqueda" class="form-control w-25">
                <option value="idusuario">Cedula</option>
                <option value="nombre">Nombre</option>
                <option value="email">Email</option>
                <option value="direccion">Dirección</option>
                <option value="telefono">Teléfono</option>
                <option value="cargo">Cargo</option>
                <option value="estado">Estado</option>
            </select>

            <!-- Campo de texto para ingresar la búsqueda -->
            <input type="text" id="buscarPersona" class="form-control w-50" placeholder="Buscar...">

            <!-- Botón para ejecutar la búsqueda -->
            <button class="btn btn-light text-white ms-2" style="background-color: #C8A2C8;" onclick="buscarPersona()">
                <i class="bi bi-search"></i> Buscar
            </button>
        </div>
    </div>


    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Cedula</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Dirección</th>
                <th>Fecha de Nacimiento</th>
                <th>Teléfono</th>
                <th>Cargo</th>
                <th>Estado</th>
                <th>Oficina</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody id="personas-list"></tbody>

        </table>
    </div>

    <div id="botones-pagina" class="d-flex flex-wrap justify-content-center gap-2"></div>





    <!-- Paginación de la lista de personas -->
    <div class="text-center mt-3">
        <div id="paginacion"></div>
    </div>

</div>

<script type="text/javascript">
    document.addEventListener("DOMContentLoaded", async () => {
        localStorage.removeItem("editIndex");
        cargarPersonas(0);

        const rol = await obtenerRol();
        if (rol === "ADMIN") {
            document.getElementById("btn1").style.display = "inline-block";
        }
    });
</script>

<!-- Pie de página -->
<footer class="bg-dark text-white text-center py-3 position-fixed bottom-0 w-100">
    &copy; Proyecto Demostración
</footer>

</body>
</html>
