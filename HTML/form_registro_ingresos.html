<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> <!-- Define la codificación de caracteres como UTF-8 -->
    <title>Crud de oficinas</title> <!-- Título de la pestaña del navegador -->

    <!-- Enlace al CSS de Bootstrap para darle estilo al sitio -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Script de Bootstrap (JS), necesario para funcionalidad como menús desplegables -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>

    <script src="../JS/notificaciones.js"></script>

    <script src="../JS/registro_ingreso.js"></script> <!-- Script personalizado para el registro de ingresos -->

    <!-- Íconos de Bootstrap para agregar íconos visuales en los botones y etiquetas -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">



    <script src="../JS/auth.js"></script> <!-- Script para autenticación -->
    <script>verificarAutenticacion();</script> <!-- Llama a la función para verificar si el usuario está autenticado -->

    <script>
        document.addEventListener("DOMContentLoaded",async function (){
            await cargarPersonas();
            let index = localStorage.getItem("editIndex");
            if(index !== null){
                let registro = await obtenerRegistro(index);
                const persona = registro.nombrePersona;
                document.getElementById("persona").value = String(persona ?? "No encontrado");
                document.getElementById("tipo").value = registro.tipo
                document.getElementById("fecha").value = registro.fecha;
                document.getElementById("hora").value = registro.hora;

            }
            let rol = await obtenerRol();
            if(rol==="REGISTRADOR"){
                document.getElementById("nav1").style.display = "none";
                document.getElementById("nav2").style.display = "none";
            }

        })
    </script>
</head>

<body>

<!-- Toast -->
<div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="toast" class="toast align-items-center border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body" id="toast-mensaje"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<!-- Barra de navegación superior -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <!-- Logo de la web -->
        <a class="navbar-brand d-flex align-items-center" href="index.html">
            <i class="bi bi-emoji-smile-fill me-2" style="font-size: 1.5rem;"></i>
            Proyecto Demostración
        </a>

        <!-- Botón para colapsar menú en móviles -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Menú de navegación -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <!-- Enlace a la lista de personas -->
                <li class="nav-item" id="nav1">
                    <a class="nav-link" href="index.html">Lista de Personas</a>
                </li>
                <!-- Enlace a la lista de oficinas -->
                <li class="nav-item" id="nav2">
                    <a class="nav-link" href="oficina.html">Lista de Oficinas</a>
                </li>
                <!-- Enlace a los registros -->
                <li class="nav-item">
                    <a class="nav-link" href="registro_ingresos.html"> Registros</a>
                </li>

                <!-- Enlace a la sección de registros -->
                <li class="nav-item">
                    <a class="nav-link" href="estadisticas.html"> Estadisticas</a>
                </li>
                <!-- Enlace para cerrar sesión -->
                <li class="nav-item">
                    <a class="nav-link text-danger fw-bold" href="login.html">Cerrar sesión</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Contenedor principal del formulario -->
<div class="container mt-4">
    <h1 class="text-center mb-4">Crud Registros</h1>
    <div id="registro-alert" class="alert d-none" role="alert"></div>

    <!-- Formulario de registro de ingresos -->
    <form id="formregistro" class="needs-validation" novalidate onsubmit="guardarRegistro(event)">
        <div class="row mb-3">

            <!-- Campo para seleccionar persona -->
            <div class="col-md-6">
                <label for="persona" class="form-label">
                    <i class="bi bi-person"></i> Seleccionar Persona
                </label>
                <select id="persona" class="form-control" required>
                    <option value="" disabled selected>Seleccione una persona</option>
                </select>
                <div class="invalid-feedback">
                    Debe seleccionar una persona.
                </div>
            </div>

            <!-- Campo para seleccionar tipo de registro (entrada o salida) -->
            <div class="col-md-6">
                <label for="tipo" class="form-label">
                    <i class="bi bi-question-diamond-fill"></i> Tipo registro
                </label>
                <select id="tipo" class="form-control" required>
                    <option value="" disabled selected>Seleccione una opción</option>
                    <option value="Entrada">Entrada</option>
                    <option value="Salida">Salida</option>
                </select>
                <div class="invalid-feedback">
                    Invalido
                </div>
            </div>

            <!-- Campo para seleccionar la fecha -->
            <div class="col-md-6">
                <label for="fecha" class="form-label"><i class="bi bi-calendar-date-fill"></i> Fecha</label>
                <input type="date" id="fecha" class="form-control" required/>
                <div class="invalid-feedback">
                    Invalido
                </div>
            </div>

            <!-- Campo para ingresar la hora -->
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="hora" class="form-label">Selecciona una hora</label>
                    <input type="time" class="form-control" id="hora" name="hora">
                </div>
            </div>

            <!-- Botones del formulario: guardar y cancelar -->
            <div class="col-md-12 text-center mt-4">
                <button type="submit" class="btn btn-light text-white me-2" style="background-color: #C8A2C8;">
                    <i class="bi bi-bookmark-fill"></i> Guardar
                </button>
                <button type="button" class="btn btn-secondary" onclick="window.location.href='registro_ingresos.html'">
                    <i class="bi bi-bookmark-x-fill"></i> Cancelar
                </button>
            </div>
        </div>
    </form>
</div>

<!-- Pie de página fijo abajo con derechos de autor -->
<footer class="bg-dark text-white text-center py-3 position-fixed bottom-0 w-100">
    &copy;  Proyecto Demostración
</footer>
</body>
</html>
